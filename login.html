<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreshNest | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/gclarke_2100039_-freshnest_utech/style.css" />
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <a href="index.html" class="navbar__logo">Fresh<span>Nest</span></a>
    <ul class="navbar__links" id="nav-links" role="list">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="login.html" class="active" aria-current="page">Login</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
    <a href="cart.html" class="navbar__cart" aria-label="View cart">🛒
      <span class="cart-count" id="cart-count">0</span>
    </a>
    <button class="navbar__toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main id="main-content" class="form-page">
    <div class="form-container fade-up" role="main">
      <h1>Welcome Back 👋</h1>
      <p>Log in to your FreshNest account to continue shopping.</p>

      <form id="login-form" novalidate aria-label="Login form">

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username"
            placeholder="Enter your username"
            autocomplete="username"
            aria-required="true"
            aria-describedby="username-error" />
          <span class="form-error" id="username-error" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            aria-required="true"
            aria-describedby="password-error" />
          <span class="form-error" id="password-error" role="alert"></span>
        </div>

        <button type="submit" class="form-submit">Login</button>

        <p class="mt-1 text-center" class="form-link">
          Don't have an account? <a href="register.html" >Register here</a>
        </p>
      </form>
    </div>
  </main>

  <footer class="footer" role="contentinfo">
    <p class="footer__logo">Fresh<span>Nest</span></p>
    <p class="footer__copy">&copy; 2026 FreshNest. All rights reserved.</p>
  </footer>

  <script src="/gclarke_2100039_-freshnest_utech/script.js"></script>
</body>
</html>

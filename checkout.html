<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreshNest | Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/gclarke_2100039_-freshnest_utech/style.css" />
  <style>
    /* IA#2 - Checkout layout */
    .checkout-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 2rem;
      max-width: 1000px;
      margin: 0 auto;
      padding: 3rem 2rem;
      align-items: start;
    }
    @media (max-width: 768px) {
      .checkout-layout { grid-template-columns: 1fr; }
    }
    .checkout-summary {
      background: var(--cream);
      border-radius: var(--radius);
      padding: 2rem;
      border: 1px solid var(--border);
      position: sticky;
      top: 90px;
    }
    .checkout-summary h2 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      color: var(--green-dark);
    }
    .summary-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: var(--text-mid);
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .summary-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--green-dark);
      padding-top: 12px;
    }
  </style>
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <a href="index.html" class="navbar__logo">Fresh<span>Nest</span></a>
    <ul class="navbar__links" id="nav-links" role="list">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
    <a href="cart.html" class="navbar__cart" aria-label="View cart">🛒
      <span class="cart-count" id="cart-count">0</span>
    </a>
    <button class="navbar__toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main id="main-content">
    <div class="checkout-layout">

      <!-- Shipping Form -->
      <section aria-labelledby="checkout-title">
        <h1 id="checkout-title" class="checkout-title">Checkout 📦</h1>
        <p class="checkout-subtitle">Enter your shipping details to complete your order.</p>

        <form id="checkout-form" novalidate aria-label="Checkout form">

          <div class="form-group">
            <label for="ship-name">Full Name</label>
            <input type="text" id="ship-name" name="ship-name"
              placeholder="e.g. Ann-Marie Wright"
              autocomplete="name"
              aria-required="true"
              aria-describedby="ship-name-error" />
            <span class="form-error" id="ship-name-error" role="alert"></span>
          </div>

          <div class="form-group">
            <label for="ship-address">Shipping Address</label>
            <input type="text" id="ship-address" name="ship-address"
              placeholder="e.g. 12 Constant Spring Rd, Kingston"
              autocomplete="street-address"
              aria-required="true"
              aria-describedby="ship-address-error" />
            <span class="form-error" id="ship-address-error" role="alert"></span>
          </div>

          <div class="form-group">
            <label for="ship-phone">Phone Number</label>
            <input type="tel" id="ship-phone" name="ship-phone"
              placeholder="e.g. 876-278-0731"
              autocomplete="tel" />
          </div>

          <div class="form-group">
            <label for="payment-method">Payment Method</label>
            <select id="payment-method" name="payment-method" aria-label="Select payment method">
              <option value="">-- Select Payment Method --</option>
              <option value="card">Credit / Debit Card</option>
              <option value="cash">Cash on Delivery</option>
              <option value="transfer">Bank Transfer</option>
            </select>
          </div>

          <div id="checkout-buttons" class="checkout-btn-row">
            <button type="submit" class="btn btn--primary" class="btn--confirm">Confirm Order ✓</button>
            <a href="cart.html" class="btn btn--outline" class="btn--cancel">Cancel</a>
          </div>

        </form>
      </section>

      <!-- Order Summary Sidebar -->
      <aside class="checkout-summary" aria-label="Order summary">
        <h2>Order Summary</h2>
        <div id="checkout-items">
          <!-- IA#2 - JS: DOM Manipulation - Injected by loadCheckoutSummary() -->
          <p class="checkout-empty">Loading your cart...</p>
        </div>
        <div class="summary-total" >
          <span>Total</span>
          <span id="checkout-total">$0.00</span>
        </div>
      </aside>

    </div>
  </main>

  <footer class="footer" role="contentinfo">
    <p class="footer__logo">Fresh<span>Nest</span></p>
    <p class="footer__copy">&copy; 2026 FreshNest. All rights reserved.</p>
  </footer>

  <script src="../script.js"></script>
  <script>
    /* =============================================
       IA#2 - JS: DOM Manipulation - Load checkout summary
       Function: loadCheckoutSummary()
       Purpose: Reads cart and displays items + total in sidebar
       Creator: Student
       ============================================= */
    function loadCheckoutSummary() {
      const container = document.getElementById('checkout-items');
      const totalEl = document.getElementById('checkout-total');
      if (!container) return;

      if (cart.length === 0) {
        container.innerHTML = '<p class="checkout-empty">Your cart is empty.</p>';
        return;
      }

      let html = '';
      let subtotal = 0;

      // IA#2 - JS: Control Structure - Loop cart items
      cart.forEach(item => {
        const line = item.price * item.qty;
        subtotal += line;
        html += `<div class="summary-item"><span>${item.name} x${item.qty}</span><span>$${line.toFixed(2)}</span></div>`;
      });

      // IA#2 - JS: Arithmetic Calculations
      const tax = subtotal * 0.15;
      const discount = subtotal > 50 ? subtotal * 0.05 : 0;
      const total = subtotal + tax - discount;

      html += `<div class="summary-item"><span>Tax (15%)</span><span>$${tax.toFixed(2)}</span></div>`;
      if (discount > 0) {
        html += `<div class="summary-item"><span>Discount</span><span>-$${discount.toFixed(2)}</span></div>`;
      }

      container.innerHTML = html;
      if (totalEl) totalEl.textContent = '$' + total.toFixed(2);
    }

    document.addEventListener('DOMContentLoaded', loadCheckoutSummary);
  </script>
</body>
</html>
